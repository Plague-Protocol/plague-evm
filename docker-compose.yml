services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: plague
    ports:
      - "5433:5432"
    volumes:
      - plague_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - plague_redis_data:/data

volumes:
  plague_postgres_data:
  plague_redis_data:
