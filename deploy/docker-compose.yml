# Plague Protocol — single-box stack (Tencent Lighthouse VPS, Celo MAINNET)
#
# Everything runs here: backend + agents + self-hosted Postgres + Redis, with
# Caddy terminating TLS for the public API. Frontend stays on Vercel and calls
# https://${API_DOMAIN}.
#
# Postgres/Redis are NOT published to the host (no `ports:`) — they're only
# reachable on the internal compose network. Only Caddy (80/443) is public.
#
# Usage (from repo root on the VPS):
#   cp deploy/.env.example deploy/.env    # then fill in secrets
#   docker compose -f deploy/docker-compose.yml up -d --build
#
# Build context is the repo root (`..`) because the backend/agents Dockerfiles
# COPY workspace manifests + zk/target from there.

name: plague

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: plague
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: plague
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plague -d plague"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]  # persist chat history across restarts
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "4000"
      # Internal service hostnames — never leave the compose network
      DATABASE_URL: postgresql://plague:${POSTGRES_PASSWORD}@postgres:5432/plague?schema=public
      REDIS_URL: redis://redis:6379
      # Celo mainnet
      NETWORK: mainnet
      CHAIN_ID: "42220"
      # Primary RPC + comma-separated fallbacks. Default is the public forno node,
      # but the whole floor's browser polling funnels through this backend's
      # /api/rpc proxy on ONE IP, and public nodes rate-limit by IP. Set
      # CELO_RPC_URL in deploy/.env to a keyed endpoint (Alchemy/dRPC/…) so the
      # proxy leans on that instead; forno/drpc stay as fallbacks. See .env.example.
      CELO_RPC_URL: ${CELO_RPC_URL:-https://forno.celo.org}
      CELO_RPC_FALLBACK_URLS: ${CELO_RPC_FALLBACK_URLS:-https://celo.drpc.org}
      CONTRACT_ADDRESS: "0xe157fD2564246Afa41cfAFaDA01a9A6f3e082710"
      FEE_MANAGER_ADDRESS: "0xc0a030a9C51c1aBc8273447EB889Fe3e96c4e2DB"
      POT_ESCROW_ADDRESS: "0xDB0858e4a10261431927c549163F3D0E1F7d2435"
      # No FEE_CURRENCY_ADDRESS → backend signer pays gas in native CELO (funded with it).
      FRONTEND_URL: ${FRONTEND_URL:-https://zplague.xyz}
      # Secrets (from deploy/.env)
      BACKEND_PRIVATE_KEY: ${BACKEND_PRIVATE_KEY}
      BOT_RUNNER_SECRET: ${BOT_RUNNER_SECRET}
      # Tuning
      RPC_TIMEOUT_MS: "20000"
      RPC_RETRY_COUNT: "2"
      RPC_RETRY_DELAY_MS: "300"
      RPC_HEALTH_MONITOR_ENABLED: "true"
      RPC_HEALTH_CHECK_INTERVAL_MS: "30000"
      ROLE_COMMIT_TIMEOUT_MS: "120000"
      ELIMINATION_PHASE_DURATION_MS: "6000"
      ROOM_SNAPSHOT_THROTTLE_MS: "250"
      # Chain event-poll cadence: fast while a game is live, slow when idle.
      # 60s idle keeps the idle Alchemy burn ~2.6M CU/mo. Tradeoff: a bot
      # self-play game is detected within one idle interval (≤60s) of starting;
      # human games are instant regardless (socket join populates liveRoomIds).
      CHAIN_EVENT_POLL_MS: ${CHAIN_EVENT_POLL_MS:-10000}
      CHAIN_EVENT_IDLE_POLL_MS: ${CHAIN_EVENT_IDLE_POLL_MS:-60000}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s   # allow `prisma migrate deploy` + boot on first run

  agents:
    build:
      context: ..
      dockerfile: agents/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NETWORK: mainnet
      CELO_RPC_URL: ${CELO_RPC_URL:-https://forno.celo.org}
      CELO_RPC_FALLBACK_URLS: ${CELO_RPC_FALLBACK_URLS:-https://celo.drpc.org}
      CONTRACT_ADDRESS: "0xe157fD2564246Afa41cfAFaDA01a9A6f3e082710"
      USDM_ADDRESS: "0x765DE816845861e75A25fCA122bb6898B8B1282a"
      # No FEE_CURRENCY_ADDRESS → bots pay gas in native CELO (they're funded with it).
      # USDm is reserved for stakes only, so it lasts far longer.
      BACKEND_URL: http://backend:4000   # internal — no public round-trip / TLS
      BOT_RUNNER_SECRET: ${BOT_RUNNER_SECRET}   # MUST match backend
      STAKE_AMOUNT: ${STAKE_AMOUNT:-100000000000000}
      BOT_MAX_STAKE_WEI: ${BOT_MAX_STAKE_WEI:-10000000000000000}
      SELF_PLAY_IDLE_MS: ${SELF_PLAY_IDLE_MS:-300000}
      CYCLE_DELAY_MS: ${CYCLE_DELAY_MS:-30000}
      SELF_PLAY_DISABLED: ${SELF_PLAY_DISABLED:-false}
      # Gas floor: bots below this many wei of native CELO are excluded from
      # games. A game spends ~0.55 CELO, but the node's balance check needs
      # gasLimit×maxFeePerGas ≈ 0.92 for the ZK commit (baseFeeMultiplier 2).
      MIN_GAME_CELO_WEI: ${MIN_GAME_CELO_WEI:-1500000000000000000}
      # Randomized self-play cadence: each game waits a fresh random gap in
      # [MIN,MAX] (avg drives spend), capped per 24h. Defaults 6h–18h, 3/day.
      SELF_PLAY_MIN_MS: ${SELF_PLAY_MIN_MS:-21600000}
      SELF_PLAY_MAX_MS: ${SELF_PLAY_MAX_MS:-64800000}
      SELF_PLAY_MAX_GAMES_PER_DAY: ${SELF_PLAY_MAX_GAMES_PER_DAY:-3}
      # Fund at least 3 wallets, contiguous from _1 (loader stops at first gap).
      # Unset keys pass through empty and are ignored, so 6..10 are safe to wire.
      BOT_PRIVATE_KEY_1: ${BOT_PRIVATE_KEY_1}
      BOT_PRIVATE_KEY_2: ${BOT_PRIVATE_KEY_2}
      BOT_PRIVATE_KEY_3: ${BOT_PRIVATE_KEY_3}
      BOT_PRIVATE_KEY_4: ${BOT_PRIVATE_KEY_4}
      BOT_PRIVATE_KEY_5: ${BOT_PRIVATE_KEY_5}
      BOT_PRIVATE_KEY_6: ${BOT_PRIVATE_KEY_6}
      BOT_PRIVATE_KEY_7: ${BOT_PRIVATE_KEY_7}
      BOT_PRIVATE_KEY_8: ${BOT_PRIVATE_KEY_8}
      BOT_PRIVATE_KEY_9: ${BOT_PRIVATE_KEY_9}
      BOT_PRIVATE_KEY_10: ${BOT_PRIVATE_KEY_10}
    volumes:
      - agentdata:/app/agents/data   # persist bot-proofs.json so setup runs only once

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config

volumes:
  pgdata:
  redisdata:
  agentdata:
  caddydata:
  caddyconfig:
